<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>He4rt Analytics</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>He4rt Analytics</h1>
      <div class="handle-row">
        <span class="at-sign">@</span>
        <input type="text" id="handleInput" placeholder="He4rtDevs" spellcheck="false">
        <button id="setHandleBtn" class="btn btn-sm">Track</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="tweets">Tweets</button>
      <button class="tab" data-tab="endpoints">Raw</button>
    </div>

    <div id="tab-tweets" class="tab-content">
      <div class="toolbar">
        <div class="stats-col">
          <span id="tweetCount" class="stats-label">0 tweets</span>
          <span id="replyCount" class="stats-sub">0 community replies</span>
        </div>
        <div class="actions">
          <button id="exportBtn" class="btn btn-sm btn-export" disabled>Export JSON</button>
          <button id="clearBtn" class="btn btn-sm btn-danger" disabled>Clear</button>
        </div>
      </div>

      <div id="emptyTweets" class="empty-state">
        <p>No tweets captured yet.</p>
        <p class="hint">Set a handle above, then visit that profile on X and scroll. Tweets are captured automatically from the UserTweets API.</p>
      </div>

      <div id="tweetList" class="tweet-list hidden"></div>
    </div>

    <div id="tab-endpoints" class="tab-content hidden">
      <div class="toolbar">
        <span id="endpointCount" class="stats-label">0 endpoints</span>
        <div class="actions">
          <button id="copyAllBtn" class="btn btn-sm btn-payload" disabled>Copy All</button>
        </div>
      </div>
      <div id="emptyEndpoints" class="empty-state">
        <p>No requests captured.</p>
      </div>
      <div id="endpointList" class="endpoint-list hidden"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
