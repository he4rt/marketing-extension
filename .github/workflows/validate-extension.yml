name: Validar extensão

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validar build, testes e manifest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Baixar código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Instalar Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: '.bun-version'

      - name: Cache de node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            node-modules-

      - name: Instalar dependências
        run: bun install --frozen-lockfile

      - name: Checar tipos
        run: bun run typecheck

      - name: Gerar build carregável no Chrome
        run: bun run build

      - name: Validar extensão
        run: bun run validate

      - name: Gerar pacote da extensão
        run: bun run package

      - name: Upload do pacote
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: he4rt-analytics-chrome-${{ github.run_id }}
          path: dist/packages/he4rt-analytics-chrome.zip
          retention-days: 30
