version: 2

updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    open-pull-requests-limit: 10
    schedule:
      timezone: 'America/Sao_Paulo'
      interval: 'weekly'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'ci'

  - package-ecosystem: 'npm'
    directory: '/'
    open-pull-requests-limit: 10
    schedule:
      timezone: 'America/Sao_Paulo'
      interval: 'daily'
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'deps'
